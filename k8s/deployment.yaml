apiVersion: apps/v1
kind: Deployment
metadata:
  name: "kimagent"
  namespace: "agents-cloud"
  labels:
    app: "kimagent"
    team: "cloud"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "kimagent"
  template:
    metadata:
      labels:
        app: "kimagent"
        team: "cloud"
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: "sa-kimagent"
      containers:
        - name: "kimagent"
          image: "acrshoppoc.azurecr.io/agents/kimagent:latest"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: "config-kimagent"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
